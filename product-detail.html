<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony Headphones - Amazon Clone</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header (Same as previous) -->
    <header class="header">
        <div class="header-top">
            <div class="container">
                <div class="logo">
                    <a href="index.html">
                        <h2>amazon</h2>
                    </a>
                </div>
                
                <div class="search-bar">
                    <select class="search-category">
                        <option>All</option>
                        <option>Electronics</option>
                    </select>
                    <input type="text" placeholder="Search Amazon">
                    <button type="submit"><i class="fas fa-search"></i></button>
                </div>
                
                <div class="header-actions">
                    <div class="language">
                        <i class="fas fa-globe"></i>
                        <span>EN</span>
                    </div>
                    <div class="account">
                        <a href="login.html">
                            <span>Hello, Sign in</span>
                            <strong>Account & Lists</strong>
                        </a>
                    </div>
                    <div class="orders">
                        <span>Returns</span>
                        <strong>& Orders</strong>
                    </div>
                    <div class="cart">
                        <a href="cart.html">
                            <i class="fas fa-shopping-cart"></i>
                            <span class="cart-count">0</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Breadcrumb -->
    <div class="breadcrumb">
        <div class="container">
            <a href="index.html">Home</a>
            <span>></span>
            <a href="products.html">Electronics</a>
            <span>></span>
            <span>Headphones</span>
        </div>
    </div>

    <!-- Product Detail -->
    <main class="product-detail">
        <div class="container">
            <div class="product-layout">
                <!-- Product Images -->
                <div class="product-images">
                    <div class="main-image">
                        <img id="mainImage" src="https://via.placeholder.com/500x500/FF9900/FFFFFF?text=Sony+Headphones" alt="Sony Headphones">
                    </div>
                    <div class="thumbnail-images">
                        <img src="https://via.placeholder.com/80x80/FF9900/FFFFFF?text=1" alt="View 1" onclick="changeImage(this.src)">
                        <img src="https://via.placeholder.com/80x80/FF9900/FFFFFF?text=2" alt="View 2" onclick="changeImage(this.src)">
                        <img src="https://via.placeholder.com/80x80/FF9900/FFFFFF?text=3" alt="View 3" onclick="changeImage(this.src)">
                        <img src="https://via.placeholder.com/80x80/FF9900/FFFFFF?text=4" alt="View 4" onclick="changeImage(this.src)">
                    </div>
                </div>

                <!-- Product Info -->
                <div class="product-info">
                    <h1>Sony WH-1000XM4 Wireless Noise Canceling Overhead Headphones</h1>
                    
                    <div class="product-rating">
                        <span class="stars">★★★★★</span>
                        <span class="rating-count">15,432 ratings</span>
                        <span class="answered-questions">| 1,234 answered questions</span>
                    </div>

                    <hr>

                    <div class="price-section">
                        <div class="price">
                            <span class="currency">$</span>
                            <span class="current-price">279</span>
                            <span class="cents">99</span>
                        </div>
